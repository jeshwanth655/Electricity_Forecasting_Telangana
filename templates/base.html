<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} – Telangana Electricity Dept</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    {% block head %}{% endblock %}
</head>

<body class="app-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">⚡</span>
            <div>
                <h2 class="sidebar-title">TS Electricity</h2>
                <span class="sidebar-sub">Chief Engineer Panel</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}"
                class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
            </a>
            <a href="{{ url_for('analysis') }}"
                class="nav-link {% if request.endpoint == 'analysis' %}active{% endif %}">
                <i class="fas fa-chart-bar"></i><span>Area Analysis</span>
            </a>
            <a href="{{ url_for('forecast_page') }}"
                class="nav-link {% if request.endpoint == 'forecast_page' %}active{% endif %}">
                <i class="fas fa-brain"></i><span>Forecasting</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="{{ url_for('logout') }}" class="nav-link logout-link">
                <i class="fas fa-sign-out-alt"></i><span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="topbar-right">
                <span class="user-badge"><i class="fas fa-user-shield"></i> Admin</span>
            </div>
        </header>
        <div class="content-area">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
