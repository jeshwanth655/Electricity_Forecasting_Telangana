<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Telangana Electricity Department</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-circle">⚡</div>
                <h1>Telangana Electricity Department</h1>
                <p class="login-subtitle">Chief Electrical Engineer Dashboard</p>
            </div>
            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('login') }}" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required
                        autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            <p class="login-footer">Government of Telangana &middot; Secured Access</p>
        </div>
    </div>
</body>

</html>
